<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Heart Disease Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 25%),
                linear-gradient(135deg, #0f172a, #111827, #1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:auto;
            padding:30px;
        }

        .container{
            width:430px;
            padding:35px;
            border-radius:25px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);

            border:1px solid rgba(255,255,255,0.12);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 0 10px rgba(255,255,255,0.05);

            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            text-align:center;
            color:#fff;
            margin-bottom:8px;
            font-size:30px;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:25px;
            font-size:14px;
        }

        form{
            width:100%;
        }

        input,
        select{
            width:100%;
            padding:14px;
            margin-bottom:16px;

            border:none;
            outline:none;

            border-radius:14px;

            background: rgba(255,255,255,0.08);
            color:#fff;

            font-size:14px;
            transition:0.3s;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        select option{
            background:#111827;
            color:#fff;
        }

        input:focus,
        select:focus{
            transform:scale(1.02);

            border:1px solid #38bdf8;

            box-shadow:
                0 0 15px rgba(56,189,248,0.4);
        }

        button{
            width:100%;
            padding:15px;

            border:none;
            border-radius:16px;

            background: linear-gradient(135deg, #06b6d4, #3b82f6);

            color:#fff;
            font-size:16px;
            font-weight:600;

            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:translateY(-2px);

            background: linear-gradient(135deg, #0891b2, #2563eb);

            box-shadow:0 10px 20px rgba(59,130,246,0.35);
        }

       #result{
    margin-top:22px;
    text-align:center;
    font-size:20px;
    font-weight:700;
    color:#fff;

    padding:12px;
    border-radius:14px;

    background: rgba(255,255,255,0.07);

    display:none;
}


/* ADD THIS PART HERE */

.author{
    text-align:center;
    margin-top:-5px;
    margin-bottom:20px;

    font-size:14px;
    font-weight:500;

    color:#94a3b8;;
    letter-spacing:0.5px;

    opacity:0;
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart-icon{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;

    animation: pulse 1.5s infinite;
}
    </style>
</head>

<body>

<div class="container">

    <div class="heart-icon">❤️</div>

    <p class="subtitle">
    Heart Risk Analysis System
</p>

<p class="author">
    Developed By Fahim Abrar Chowdhury
</p>

    <form id="predictForm">

        <input type="number" id="Age" placeholder="Enter Age">

        <select id="Sex">
            <option value="">Select Gender</option>
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <select id="ChestPain">
            <option value="">Chest Pain Type</option>
            <option value="asymptomatic">Asymptomatic</option>
            <option value="nonanginal">Non-anginal</option>
            <option value="nontypical">Non-typical</option>
            <option value="typical">Typical</option>
        </select>

        <input type="number" id="RestBP" placeholder="Resting Blood Pressure">

        <input type="number" id="Chol" placeholder="Cholesterol Level">

        <select id="Fbs">
            <option value="">Fasting Blood Sugar</option>
            <option value="1">True (1)</option>
            <option value="0">False (0)</option>
        </select>

        <select id="RestECG">
            <option value="">Rest ECG</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
        </select>

        <input type="number" id="MaxHR" placeholder="Maximum Heart Rate">

        <select id="ExAng">
            <option value="">Exercise Angina</option>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <input type="number" step="0.1" id="Oldpeak" placeholder="Oldpeak">

        <select id="Slope">
            <option value="">Slope</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <select id="Ca">
            <option value="">CA</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <select id="Thal">
            <option value="">Thal</option>
            <option value="1">1 (Normal)</option>
            <option value="2">2 (Reversible)</option>
            <option value="0">0 (Fixed)</option>
        </select>

        <button type="button" onclick="predict()">
            Predict Now
        </button>

    </form>

    <h2 id="result"></h2>

</div>

<script>

async function predict() {

    const data = {
        Age: parseInt(document.getElementById("Age").value),
        Sex: parseInt(document.getElementById("Sex").value),
        ChestPain: document.getElementById("ChestPain").value,
        RestBP: parseFloat(document.getElementById("RestBP").value),
        Chol: parseFloat(document.getElementById("Chol").value),
        Fbs: parseInt(document.getElementById("Fbs").value),
        RestECG: parseInt(document.getElementById("RestECG").value),
        MaxHR: parseFloat(document.getElementById("MaxHR").value),
        ExAng: parseInt(document.getElementById("ExAng").value),
        Oldpeak: parseFloat(document.getElementById("Oldpeak").value),
        Slope: parseInt(document.getElementById("Slope").value),
        Ca: parseFloat(document.getElementById("Ca").value),
        Thal: parseInt(document.getElementById("Thal").value)
    };

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const resultBox = document.getElementById("result");

    resultBox.style.display = "block";

    if(result.has_heart_disease){

        resultBox.innerHTML = "⚠ Heart Disease Detected";

        resultBox.style.background =
            "rgba(239,68,68,0.15)";

        resultBox.style.color = "#fecaca";

    } else {

        resultBox.innerHTML = "✅ No Heart Disease";

        resultBox.style.background =
            "rgba(34,197,94,0.15)";

        resultBox.style.color = "#bbf7d0";
    }
}

</script>

</body>
</html>
